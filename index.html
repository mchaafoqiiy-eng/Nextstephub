    const mc=country==="All Countries"||o.country===country;
    const ml=level==="All Levels"||o.level===level;
    return mt&&ms&&mc&&ml;

function AI({opps}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"👋 **Hello! I'm your NextStepHub AI Advisor.**\n\nTell me about yourself — your age, background, goals, and preferred country — and I'll give you personalized recommendations with a step-by-step application guide!\n\n**Example:** *\"I'm 22, finished engineering, want to study in Europe.\"*"}]);
  const [inp,setInp]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const ctx=opps.map(o=>`[${o.type.toUpperCase()}] "${o.title}" | ${o.org} | ${o.country} | ${o.level} | Deadline:${o.deadline||"Rolling"} | Tags:${o.tags.join(",")}`).join("\n");

  async function send(){
    const t=inp.trim();
    if(!t||loading)return;
    setInp("");setErr(null);
    const newMsgs=[...msgs,{role:"user",content:t}];
    setMsgs(newMsgs);setLoading(true);
    const sys=`You are NextStepHub's AI Advisor. Be warm, specific, actionable.\n\nPlatform opportunities:\n${ctx}\n\nFormat responses with:\n**🎯 Top Picks For You** (2-3 specific opportunity names + why they match)\n**📋 Step-by-Step: [Best Match]** (numbered steps)\n**💡 Pro Tips** (3 tips)\n\nReference real opportunity names from the list. Use markdown.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,
          messages:newMsgs.map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||"Sorry, couldn't generate a response.";
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
    }catch(e){setErr("Connection error. Please try again.");}
    finally{setLoading(false);}
  }

  function renderMd(text){
    return text.split("\n").map((line,i)=>{
      if(line.startsWith("**")&&line.endsWith("**"))
        return React.createElement("div",{key:i,style:{fontWeight:800,color:"#0f172a",marginTop:10,marginBottom:3,fontSize:14}},line.slice(2,-2));
      const parts=line.split(/(\*\*[^*]+\*\*)/g).map((p,j)=>
        p.startsWith("**")?React.createElement("strong",{key:j,style:{fontWeight:700}},p.slice(2,-2)):p);
      return React.createElement("div",{key:i,style:{lineHeight:1.65,fontSize:14}},parts);
    });
  }

  const suggestions=["I'm 20 and want to study in France","Looking for volunteering in Africa","Software engineer seeking remote jobs","Recent grad, want fully-funded scholarship"];

  return React.createElement("div",{style:{minHeight:"80vh",background:"linear-gradient(160deg,#f8fafc,#eff6ff)",padding:"36px 20px"}},
    React.createElement("div",{style:{maxWidth:740,margin:"0 auto"}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:26}},
        React.createElement("div",{style:{width:60,height:60,borderRadius:16,background:"linear-gradient(135deg,#4f46e5,#7c3aed)",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px",
          boxShadow:"0 8px 28px rgba(79,70,229,0.35)"}},"🤖"),
        React.createElement("h1",{style:{fontSize:24,fontWeight:900,color:"#0f172a",margin:0}},"AI Opportunity Advisor"),
        React.createElement("p",{style:{color:"#64748b",marginTop:6,fontSize:14}},"Powered by Claude AI · Personalized guidance in seconds")
      ),
      React.createElement("div",{style:{background:"#fff",borderRadius:20,border:"1.5px solid #e2e8f0",boxShadow:"0 8px 40px rgba(0,0,0,0.09)",overflow:"hidden"}},
        React.createElement("div",{style:{background:"linear-gradient(135deg,#1e3a8a,#4f46e5)",padding:"13px 18px",display:"flex",alignItems:"center",gap:10}},
          React.createElement("div",{style:{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.18)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"🤖"),
          React.createElement("div",null,
            React.createElement("div",{style:{color:"#fff",fontWeight:800,fontSize:14}},"NextStepHub AI"),
            React.createElement("div",{style:{color:"#93c5fd",fontSize:11}},"● Online · "+opps.length+" opportunities loaded")
          )
        ),
        React.createElement("div",{style:{height:400,overflowY:"auto",padding:18,display:"flex",flexDirection:"column",gap:12}},
          msgs.map((m,i)=>React.createElement("div",{key:i,style:{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:7}},
            m.role==="assistant"&&React.createElement("div",{style:{width:28,height:28,borderRadius:"50%",background:"#eff6ff",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,alignSelf:"flex-end",border:"1px solid #bfdbfe"}},"🤖"),
            React.createElement("div",{style:{maxWidth:"82%",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
              padding:"11px 14px",background:m.role==="user"?"linear-gradient(135deg,#2563eb,#1d4ed8)":"#f1f5f9",
              color:m.role==="user"?"#fff":"#0f172a"}},
              m.role==="assistant"?renderMd(m.content):React.createElement("span",{style:{fontSize:14}},m.content)
            )
          )),
          loading&&React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center"}},

              [0,1,2].map(j=>React.createElement("div",{key:j,style:{width:6,height:6,borderRadius:"50%",background:"#94a3b8",
                animation:`bounce 1.2s infinite`,animationDelay:`${j*0.2}s`}}))
            )

          suggestions.map(s=>React.createElement("button",{key:s,onClick:()=>setInp(s),
            style:{background:"#eff6ff",color:"#2563eb",border:"1.5px solid #bfdbfe",borderRadius:20,
              padding:"4px 12px",fontSize:11,cursor:"pointer",fontWeight:600}},s))
        ),
        React.createElement("div",{style:{padding:"11px 14px",borderTop:"1px solid #f1f5f9",display:"flex",gap:9,alignItems:"flex-end"}},
          React.createElement("textarea",{value:inp,onChange:e=>setInp(e.target.value),
            onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}},

          React.createElement("button",{onClick:send,disabled:loading||!inp.trim(),

              padding:"11px 18px",cursor:loading||!inp.trim()?"not-allowed":"pointer",fontWeight:800,fontSize:13}},"Send ↑")
        )
